# Applies pending Supabase migrations to the production database on every push to
# main that touches migration files. Trigger manually via git commit + push.
#
# Required GitHub configuration (Settings → Secrets and variables → Actions):
#   Secret  SUPABASE_ACCESS_TOKEN  — Supabase personal access token (rotate annually)
#   Variable SUPABASE_PROJECT_REF  — Project ref, e.g. zieevqjuvimxqozzlysy
#
# Supabase does not support OIDC — SUPABASE_ACCESS_TOKEN is a long-lived secret.
# Mitigation: token is scoped to this project only and rotated on a calendar reminder.
name: Apply Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

permissions: {}

concurrency:
  group: supabase-migrate
  # false: migrations mutate remote database state and must never be killed mid-run
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.107.0

      - name: Apply migrations
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push --linked
          echo "### Migrations applied ✓" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: \`$GITHUB_REF_NAME\` — commit: \`$GITHUB_SHA\`" >> "$GITHUB_STEP_SUMMARY"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
